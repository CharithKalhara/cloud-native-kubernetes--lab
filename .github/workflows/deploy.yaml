name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:latest \
            app

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:latest

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Create Ansible Inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [servers]
          ${{ secrets.SERVER_IP }} ansible_user=${{ secrets.SERVER_USER }}
          EOF

      - name: Run Ansible Deploy Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/deploy.yml \
            --private-key ~/.ssh/id_rsa