name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -f app/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:latest \
            app

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-kubernetes:latest

      - name: Deploy with Ansible
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/cloud-native-kubernetes--lab/ansible

            ansible-playbook playbook.yml