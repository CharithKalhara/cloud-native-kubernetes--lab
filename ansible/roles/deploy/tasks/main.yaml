---
- name: Update repository
  git:
    repo: https://github.com/CharithKalhara/cloud-native-kubernetes--lab.git
    dest: /home/{{ ansible_user }}/cloud-native-kubernetes--lab
    version: main
    force: yes

- name: Create namespace
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/namespace/

- name: Apply ConfigMaps
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/configmap/

- name: Apply Secrets
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/secret/

- name: Apply Storage
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/storage/

- name: Apply Deployments
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/deployment/

- name: Apply Services
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/service/

- name: Apply HPA
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/hpa/

- name: Apply Ingress
  shell: |
    kubectl apply -f /home/{{ ansible_user }}/cloud-native-kubernetes--lab/kubernetes/ingress/

- name: Restart application
  shell: |
    kubectl rollout restart deployment hello-app -n production-lab

- name: Wait for rollout
  shell: |
    kubectl rollout status deployment hello-app -n production-lab --timeout=300s

- name: Show pods
  shell: kubectl get pods -n production-lab

- name: Show services
  shell: kubectl get svc -n production-lab

- name: Show ingress
  shell: kubectl get ingress -n production-lab