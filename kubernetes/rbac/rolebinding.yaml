apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: hello-app-rolebinding
  namespace: production-lab

subjects:
  - kind: ServiceAccount
    name: hello-app-sa
    namespace: production-lab

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hello-app-role