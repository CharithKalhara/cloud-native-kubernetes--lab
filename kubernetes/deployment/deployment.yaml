apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-app
  namespace: production-lab
  labels:
    app: hello-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-app

  template:
    metadata:
      labels:
        app: hello-app

    spec:
      serviceAccountName: hello-app-sa
      containers:
        - name: hello-app
          image: charithkalhara/hello-kubernetes:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: app-storage
              mountPath: /app/data

          envFrom:
            - configMapRef:
                name: hello-app-config
            - secretRef:
                name: hello-app-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /api/info
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /api/info
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: hello-app-pvc